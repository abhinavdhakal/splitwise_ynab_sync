name: Splitwise YNAB Sync

on:
  # Scheduled run every 12 hours (at 6 AM and 6 PM UTC)
  schedule:
    - cron: "0 6,18 * * *"

  # Manual trigger option
  workflow_dispatch:
    inputs:
      sync_days:
        description: "Number of days to sync (default: 15)"
        required: false
        default: "3"
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Splitwise YNAB Sync
        env:
          SPLITWISE_API_KEY: ${{ secrets.SPLITWISE_API_KEY }}
          YNAB_TOKEN: ${{ secrets.YNAB_TOKEN }}
          YNAB_BUDGET_NAME: ${{ secrets.YNAB_BUDGET_NAME }}
          YNAB_ACCOUNT_NAME: ${{ secrets.YNAB_ACCOUNT_NAME }}
          SYNC_DAYS: ${{ github.event.inputs.sync_days || '15' }}
        run: |
          python splitwise_ynab_sync.py --once --days ${{ github.event.inputs.sync_days || '15' }}

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: sync-logs
          path: "*.log"
          retention-days: 7
