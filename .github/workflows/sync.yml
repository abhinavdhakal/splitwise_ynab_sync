name: Splitwise YNAB Sync

on:
  schedule:
    - cron: "0 6 * * *"  # Every day at 6 AM UTC

  workflow_dispatch:
    inputs:
      sync_days:
        description: "Number of days to sync (default: 15)"
        required: false
        default: "15"
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync
        env:
          SW_API_KEY: ${{ secrets.SW_API_KEY }}
          YNAB_TOKEN: ${{ secrets.YNAB_TOKEN }}
          YNAB_BUDGET: ${{ secrets.YNAB_BUDGET }}
          YNAB_SW_ACCOUNT: ${{ secrets.YNAB_SW_ACCOUNT }}
          YNAB_SW_CATEGORY: ${{ secrets.YNAB_SW_CATEGORY }}
          USER_NAME: ${{ secrets.USER_NAME }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          SYNC_DAYS: ${{ github.event.inputs.sync_days || '15' }}
        run: |
          python main.py --once --days ${{ github.event.inputs.sync_days || '15' }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: "*.log"
          retention-days: 7
